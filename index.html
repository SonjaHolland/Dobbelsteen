<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Dice Roller</title>

<style>
    body {
        background: #0b6623;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40px;
        color: white;
    }

    .dice-area {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 30px;
        perspective: 800px;
    }

    .dice {
        width: 100px;
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(.25,1.5,.5,1);
    }

    .face {
        position: absolute;
        width: 100px;
        height: 100px;
        background: white;
        border: 3px solid #222;
        border-radius: 10px;
    }

    /* PIP STYLE */
    .pip {
        width: 18px;
        height: 18px;
        background: black;
        border-radius: 50%;
        position: absolute;
    }

    /* PIP POSITIONS */
    .tl { top: 15px; left: 15px; }
    .tr { top: 15px; right: 15px; }
    .bl { bottom: 15px; left: 15px; }
    .br { bottom: 15px; right: 15px; }
    .c  { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .ml { top: 50%; left: 15px; transform: translateY(-50%); }
    .mr { top: 50%; right: 15px; transform: translateY(-50%); }

    /* 3D POSITIONS */
    .front  { transform: rotateY(0deg) translateZ(50px); }
    .back   { transform: rotateY(180deg) translateZ(50px); }
    .right  { transform: rotateY(90deg) translateZ(50px); }
    .left   { transform: rotateY(-90deg) translateZ(50px); }
    .top    { transform: rotateX(90deg) translateZ(50px); }
    .bottom { transform: rotateX(-90deg) translateZ(50px); }

    button, select {
        padding: 10px 18px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    button {
        background: gold;
        color: black;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>3D Dice Roller</h1>

<select id="diceCount">
    <option value="1">1 die</option>
    <option value="2">2 dice</option>
</select>
<button onclick="rollDice()">Roll Dice</button>

<div id="diceArea" class="dice-area"></div>

<script>
function createFace(pipClasses, faceClass) {
    const face = document.createElement("div");
    face.className = "face " + faceClass;

    pipClasses.forEach(cls => {
        const pip = document.createElement("div");
        pip.className = "pip " + cls;
        face.appendChild(pip);
    });

    return face;
}

function createDice() {
    const dice = document.createElement("div");
    dice.className = "dice";

    const faces = [
        { class: "front",  pips: ["c"] },                                      // 1
        { class: "back",   pips: ["tl","tr","ml","mr","bl","br"] },            // 6
        { class: "right",  pips: ["tl","c","br"] },                            // 3
        { class: "left",   pips: ["tl","tr","bl","br"] },                      // 4
        { class: "top",    pips: ["tl","tr","c","bl","br"] },                  // 5
        { class: "bottom", pips: ["tl","br"] }                                 // 2
    ];

    faces.forEach(f => dice.appendChild(createFace(f.pips, f.class)));

    return dice;
}

function rollDice() {
    const count = document.getElementById("diceCount").value;
    const area = document.getElementById("diceArea");
    area.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const dice = createDice();
        area.appendChild(dice);

        // Pick a random result 1–6
        const result = Math.floor(Math.random() * 6) + 1;

        // Predefined rotations for each face
        const rotations = {
            1: { x: 0,   y: 0   },
            2: { x: -90, y: 0   },
            3: { x: 0,   y: 90  },
            4: { x: 0,   y: -90 },
            5: { x: 90,  y: 0   },
            6: { x: 180, y: 0   }
        };

        // Add extra full spins for realism
        const extraX = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraY = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraZ = 360 * (Math.floor(Math.random() * 4) + 1);

        const finalX = rotations[result].x + extraX;
        const finalY = rotations[result].y + extraY;
        const finalZ = extraZ;

        setTimeout(() => {
            dice.style.transform =
                `rotateX(${finalX}deg) rotateY(${finalY}deg) rotateZ(${finalZ}deg)`;
        }, 50);
    }
}
</script>

</body>
</html>
