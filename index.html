<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Dice Roller</title>

<style>
    body {
        margin: 0;
        width: 1024px;
        height: 768px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url('https://i.imgur.com/8pQeQ0R.jpeg'); /* Wooden table */
        background-size: cover;
        background-position: center;
        overflow: hidden;
    }

    .dice-area {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 60px;
        perspective: 1200px;
    }

    .dice {
        width: 260px;
        height: 260px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1.2s ease-out;
    }

    .face {
        position: absolute;
        width: 260px;
        height: 260px;
        background: white;
        border: 6px solid #222;
        border-radius: 20px;
    }

    .pip {
        width: 40px;
        height: 40px;
        background: black;
        border-radius: 50%;
        position: absolute;
    }

    .tl { top: 25px; left: 25px; }
    .tr { top: 25px; right: 25px; }
    .bl { bottom: 25px; left: 25px; }
    .br { bottom: 25px; right: 25px; }
    .c  { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .ml { top: 50%; left: 25px; transform: translateY(-50%); }
    .mr { top: 50%; right: 25px; transform: translateY(-50%); }

    .front  { transform: rotateY(0deg) translateZ(130px); }
    .back   { transform: rotateY(180deg) translateZ(130px); }
    .right  { transform: rotateY(90deg) translateZ(130px); }
    .left   { transform: rotateY(-90deg) translateZ(130px); }
    .top    { transform: rotateX(90deg) translateZ(130px); }
    .bottom { transform: rotateX(-90deg) translateZ(130px); }

    .controls {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
    }

    select, button {
        padding: 12px 20px;
        font-size: 20px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    button {
        background: gold;
        color: black;
    }
</style>
</head>

<body>

<div class="controls">
    <select id="diceCount">
        <option value="1">1 die</option>
        <option value="2">2 dice</option>
    </select>
    <button onclick="rollDice()">Roll Dice</button>
</div>

<div id="diceArea" class="dice-area"></div>

<script>
function createFace(pips, cls) {
    const face = document.createElement("div");
    face.className = "face " + cls;

    pips.forEach(p => {
        const pip = document.createElement("div");
        pip.className = "pip " + p;
        face.appendChild(pip);
    });

    return face;
}

function createDice() {
    const dice = document.createElement("div");
    dice.className = "dice";

    const faces = [
        { cls: "front",  p: ["c"] },                                      // 1
        { cls: "back",   p: ["tl","tr","ml","mr","bl","br"] },            // 6
        { cls: "right",  p: ["tl","c","br"] },                            // 3
        { cls: "left",   p: ["tl","tr","bl","br"] },                      // 4
        { cls: "top",    p: ["tl","tr","c","bl","br"] },                  // 5
        { cls: "bottom", p: ["tl","br"] }                                 // 2
    ];

    faces.forEach(f => dice.appendChild(createFace(f.p, f.cls)));

    return dice;
}

function rollDice() {
    const count = document.getElementById("diceCount").value;
    const area = document.getElementById("diceArea");
    area.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const dice = createDice();
        area.appendChild(dice);

        const result = Math.floor(Math.random() * 6) + 1;

        const base = {
            1: {x: 0,   y: 0},
            2: {x: -90, y: 0},
            3: {x: 0,   y: 90},
            4: {x: 0,   y: -90},
            5: {x: 90,  y: 0},
            6: {x: 180, y: 0}
        };

        const extraX = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraY = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraZ = 360 * (Math.floor(Math.random() * 4) + 1);

        const finalX = base[result].x + extraX;
        const finalY = base[result].y + extraY;
        const finalZ = extraZ;

        setTimeout(() => {
            dice.style.transform =
                `rotateX(${finalX}deg) rotateY(${finalY}deg) rotateZ(${finalZ}deg)`;
        }, 50);
    }
}
</script>

</body>
</html>
