<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Dice Roller</title>

<style>
    body {
        background: #0b6623;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40px;
        color: white;
    }

    h1 {
        margin-bottom: 10px;
    }

    .controls {
        margin-bottom: 20px;
    }

    select, button {
        padding: 10px 18px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    button {
        background: gold;
        color: black;
        font-weight: bold;
    }

    .dice-area {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 30px;
        perspective: 800px;
    }

    .dice {
        width: 100px;
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(.25,1.5,.5,1);
    }

    .face {
        position: absolute;
        width: 100px;
        height: 100px;
        background: white;
        border: 3px solid #222;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .pips {
        position: relative;
        width: 70px;
        height: 70px;
    }

    .pip {
        width: 12px;
        height: 12px;
        background: black;
        border-radius: 50%;
        position: absolute;
    }

    /* pip positions */
    .tl { top: 10%; left: 10%; }
    .tr { top: 10%; right: 10%; }
    .bl { bottom: 10%; left: 10%; }
    .br { bottom: 10%; right: 10%; }
    .c  { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .ml { top: 50%; left: 10%; transform: translateY(-50%); }
    .mr { top: 50%; right: 10%; transform: translateY(-50%); }

    /* 3D positions */
    .front  { transform: rotateY(0deg) translateZ(50px); }   /* 1 */
    .back   { transform: rotateY(180deg) translateZ(50px); } /* 6 */
    .right  { transform: rotateY(90deg) translateZ(50px); }  /* 3 */
    .left   { transform: rotateY(-90deg) translateZ(50px); } /* 4 */
    .top    { transform: rotateX(90deg) translateZ(50px); }  /* 5 */
    .bottom { transform: rotateX(-90deg) translateZ(50px); } /* 2 */
</style>
</head>

<body>

<h1>3D Dice Roller</h1>

<div class="controls">
    <label style="font-size:18px;">Number of dice:</label>
    <select id="diceCount">
        <option value="1">1 die</option>
        <option value="2">2 dice</option>
    </select>
    <button onclick="rollDice()">Roll Dice</button>
</div>

<div id="diceArea" class="dice-area"></div>

<script>
function createFace(pipPattern, extraClass) {
    const face = document.createElement("div");
    face.className = "face " + extraClass;

    const pipsContainer = document.createElement("div");
    pipsContainer.className = "pips";

    pipPattern.forEach(cls => {
        const pip = document.createElement("div");
        pip.className = "pip " + cls;
        pipsContainer.appendChild(pip);
    });

    face.appendChild(pipsContainer);
    return face;
}

function createDice() {
    const dice = document.createElement("div");
    dice.className = "dice";

    // Pip patterns for each value
    const faces = [
        { class: "front",  pips: ["c"] },                                      // 1
        { class: "back",   pips: ["tl","tr","ml","mr","bl","br"] },            // 6
        { class: "right",  pips: ["tl","c","br"] },                            // 3
        { class: "left",   pips: ["tl","tr","bl","br"] },                      // 4
        { class: "top",    pips: ["tl","tr","c","bl","br"] },                  // 5
        { class: "bottom", pips: ["tl","br"] }                                 // 2
    ];

    faces.forEach(f => {
        dice.appendChild(createFace(f.pips, f.class));
    });

    return dice;
}

function rollDice() {
    const count = document.getElementById("diceCount").value;
    const area = document.getElementById("diceArea");
    area.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const dice = createDice();
        area.appendChild(dice);

        const x = 360 * (Math.floor(Math.random() * 4) + 1);
        const y = 360 * (Math.floor(Math.random() * 4) + 1);
        const z = 360 * (Math.floor(Math.random() * 4) + 1);

        setTimeout(() => {
            dice.style.transform = `rotateX(${x}deg) rotateY(${y}deg) rotateZ(${z}deg)`;
        }, 50);
    }
}
</script>

</body>
</html>
