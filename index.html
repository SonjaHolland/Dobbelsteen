<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Dice Roller</title>

<style>
    body {
        background: #0b6623;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40px;
        color: white;
    }

    h1 {
        margin-bottom: 10px;
    }

    .controls {
        margin-bottom: 20px;
    }

    select, button {
        padding: 10px 18px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    button {
        background: gold;
        color: black;
        font-weight: bold;
    }

    .dice-area {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 30px;
        perspective: 800px;
    }

    .dice {
        width: 100px;
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(.25,1.5,.5,1);
    }

    .face {
        position: absolute;
        width: 100px;
        height: 100px;
        background: white;
        border: 3px solid #222;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 40px;
        font-weight: bold;
    }

    /* 3D positions */
    .front  { transform: rotateY(0deg) translateZ(50px); }
    .back   { transform: rotateY(180deg) translateZ(50px); }
    .right  { transform: rotateY(90deg) translateZ(50px); }
    .left   { transform: rotateY(-90deg) translateZ(50px); }
    .top    { transform: rotateX(90deg) translateZ(50px); }
    .bottom { transform: rotateX(-90deg) translateZ(50px); }
</style>
</head>

<body>

<h1>3D Dice Roller</h1>

<div class="controls">
    <label style="font-size:18px;">Number of dice:</label>
    <select id="diceCount">
        <option value="1">1 die</option>
        <option value="2">2 dice</option>
    </select>
    <button onclick="rollDice()">Roll Dice</button>
</div>

<div id="diceArea" class="dice-area"></div>

<script>
function createDice() {
    const dice = document.createElement("div");
    dice.className = "dice";

    const faces = [
        { class: "front",  value: 1 },
        { class: "back",   value: 6 },
        { class: "right",  value: 3 },
        { class: "left",   value: 4 },
        { class: "top",    value: 5 },
        { class: "bottom", value: 2 }
    ];

    faces.forEach(f => {
        const face = document.createElement("div");
        face.className = "face " + f.class;
        face.textContent = f.value;
        dice.appendChild(face);
    });

    return dice;
}

function rollDice() {
    const count = document.getElementById("diceCount").value;
    const area = document.getElementById("diceArea");
    area.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const dice = createDice();
        area.appendChild(dice);

        // Random rotation for realistic roll
        const x = 360 * (Math.floor(Math.random() * 4) + 1);
        const y = 360 * (Math.floor(Math.random() * 4) + 1);
        const z = 360 * (Math.floor(Math.random() * 4) + 1);

        setTimeout(() => {
            dice.style.transform = `rotateX(${x}deg) rotateY(${y}deg) rotateZ(${z}deg)`;
        }, 50);
    }
}
</script>

</body>
</html>
